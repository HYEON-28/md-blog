<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대시보드 — GitXpert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body,
      html {
        min-height: 100vh;
        background: #0d1117;
        color: #e6edf3;
        font-family: "Pretendard", sans-serif;
      }

      /* NAV */
      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 56px;
        border-bottom: 1px solid #21262d;
        background: #0d1117;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo-mark {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #58a6ff, #3fb950);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: #0d1117;
      }
      .nav-logo-text {
        font-size: 15px;
        font-weight: 600;
        color: #e6edf3;
        letter-spacing: -0.01em;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 32px;
        padding: 0 14px;
        background: #21262d;
        border: 1px solid #444c56;
        border-radius: 6px;
        font-size: 12px;
        color: #c9d1d9;
        font-family: "Pretendard", sans-serif;
        cursor: pointer;
        transition: background 0.15s;
      }
      .nav-btn:hover {
        background: #2d333b;
      }
      .nav-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, #388bfd, #3fb950);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
      }

      /* MAIN */
      .main {
        max-width: 900px;
        margin: 0 auto;
        padding: 36px 24px 60px;
      }

      .greeting {
        margin-bottom: 28px;
      }
      .greeting-sub {
        font-size: 12px;
        color: #8b949e;
        font-family: "JetBrains Mono", monospace;
        margin-bottom: 5px;
      }
      .greeting-title {
        font-size: 22px;
        font-weight: 600;
        color: #e6edf3;
        letter-spacing: -0.02em;
      }
      .greeting-title span {
        color: #58a6ff;
      }

      .stat-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 32px;
      }
      .stat-card {
        background: #161b22;
        border: 1px solid #21262d;
        border-radius: 10px;
        padding: 16px 18px;
      }
      .stat-label {
        font-size: 12px;
        color: #8b949e;
        margin-bottom: 6px;
      }
      .stat-value {
        font-size: 24px;
        font-weight: 600;
        color: #e6edf3;
        font-family: "JetBrains Mono", monospace;
        line-height: 1;
      }
      .stat-sub {
        font-size: 11px;
        margin-top: 4px;
        font-family: "JetBrains Mono", monospace;
      }

      /* SECTION */
      .section {
        margin-bottom: 24px;
        border: 1px solid #21262d;
        border-radius: 12px;
        overflow: hidden;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 18px;
        background: #161b22;
        cursor: pointer;
        user-select: none;
        transition: background 0.12s;
      }
      .section-header:hover {
        background: #1c2128;
      }
      .section-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-icon {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .icon-repo {
        background: rgba(56, 139, 253, 0.15);
      }
      .icon-blog {
        background: rgba(63, 185, 80, 0.15);
      }
      .icon-update {
        background: rgba(210, 153, 34, 0.15);
      }
      .section-title {
        font-size: 14px;
        font-weight: 500;
        color: #e6edf3;
      }
      .section-count {
        font-size: 11px;
        color: #8b949e;
        background: #21262d;
        border-radius: 20px;
        padding: 2px 8px;
        font-family: "JetBrains Mono", monospace;
      }
      .section-header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-action-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        height: 26px;
        padding: 0 11px;
        background: #21262d;
        border: 1px solid #444c56;
        border-radius: 6px;
        font-size: 11px;
        color: #c9d1d9;
        font-family: "Pretendard", sans-serif;
        cursor: pointer;
        transition: background 0.15s;
      }
      .header-action-btn:hover {
        background: #2d333b;
        color: #e6edf3;
      }
      .chevron {
        width: 15px;
        height: 15px;
        color: #8b949e;
        transition: transform 0.22s ease;
        flex-shrink: 0;
      }
      .chevron.open {
        transform: rotate(180deg);
      }
      .section-body {
        background: #0d1117;
        overflow: hidden;
        max-height: 2000px;
        transition: max-height 0.3s ease;
      }
      .section-body.collapsed {
        max-height: 0;
      }

      /* REPO LIST */
      .repo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        border-top: 1px solid #161b22;
        transition: background 0.1s;
        cursor: pointer;
      }
      .repo-item:first-child {
        border-top: none;
      }
      .repo-item:hover {
        background: #161b22;
      }
      .repo-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .repo-info {
        flex: 1;
        min-width: 0;
      }
      .repo-name {
        font-size: 13px;
        font-weight: 500;
        color: #58a6ff;
        font-family: "JetBrains Mono", monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .repo-desc {
        font-size: 12px;
        color: #8b949e;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .repo-meta-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        border: 1px solid;
        white-space: nowrap;
      }
      .tag-active {
        color: #3fb950;
        border-color: rgba(63, 185, 80, 0.3);
        background: rgba(63, 185, 80, 0.08);
      }
      .tag-lang {
        color: #8b949e;
        border-color: #30363d;
      }
      .tag-blog {
        color: #a371f7;
        border-color: rgba(163, 113, 247, 0.3);
        background: rgba(163, 113, 247, 0.08);
      }
      .repo-updated {
        font-size: 11px;
        color: #484f58;
        font-family: "JetBrains Mono", monospace;
      }

      /* BLOG LIST */
      .blog-repo-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 18px;
        border-top: 1px solid #161b22;
        cursor: pointer;
        transition: background 0.1s;
      }
      .blog-repo-row:first-child {
        border-top: none;
      }
      .blog-repo-row:hover {
        background: #161b22;
      }
      .blog-repo-icon {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        background: rgba(163, 113, 247, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .blog-repo-info {
        flex: 1;
        min-width: 0;
      }
      .blog-repo-name {
        font-size: 13px;
        font-weight: 500;
        color: #a371f7;
        font-family: "JetBrains Mono", monospace;
      }
      .blog-repo-sub {
        font-size: 12px;
        color: #8b949e;
        margin-top: 2px;
      }
      .blog-repo-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .md-count {
        font-size: 11px;
        color: #8b949e;
        background: #21262d;
        border-radius: 20px;
        padding: 2px 8px;
        font-family: "JetBrains Mono", monospace;
      }
      .pub-count {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        border: 1px solid;
        color: #3fb950;
        border-color: rgba(63, 185, 80, 0.3);
        background: rgba(63, 185, 80, 0.08);
      }
      .draft-count {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        border: 1px solid;
        color: #d29922;
        border-color: rgba(210, 153, 34, 0.3);
        background: rgba(210, 153, 34, 0.08);
      }

      /* UPDATE 2-level */
      .update-repo-group {
        border-top: 1px solid #161b22;
      }
      .update-repo-group:first-child {
        border-top: none;
      }
      .update-repo-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        cursor: pointer;
        user-select: none;
        transition: background 0.1s;
      }
      .update-repo-header:hover {
        background: #161b22;
      }
      .update-repo-icon {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: rgba(56, 139, 253, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .update-repo-name {
        font-size: 13px;
        font-weight: 500;
        color: #c9d1d9;
        font-family: "JetBrains Mono", monospace;
        flex: 1;
      }
      .update-repo-stats {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
      }
      .diff-add {
        color: #3fb950;
      }
      .diff-del {
        color: #f85149;
      }
      .update-file-count {
        font-size: 11px;
        color: #8b949e;
        background: #21262d;
        border-radius: 20px;
        padding: 2px 8px;
        font-family: "JetBrains Mono", monospace;
      }
      .update-files {
        overflow: hidden;
        max-height: 800px;
        transition: max-height 0.25s ease;
      }
      .update-files.collapsed {
        max-height: 0;
      }
      .update-file-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 18px 9px 52px;
        border-top: 1px solid #161b22;
        transition: background 0.1s;
      }
      .update-file-item:hover {
        background: #161b22;
      }
      .file-type-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-added {
        background: #3fb950;
      }
      .dot-modified {
        background: #58a6ff;
      }
      .dot-deleted {
        background: #f85149;
      }
      .file-name {
        font-size: 12px;
        color: #c9d1d9;
        font-family: "JetBrains Mono", monospace;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-msg {
        font-size: 11px;
        color: #8b949e;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-diff {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        flex-shrink: 0;
      }
      .file-time {
        font-size: 11px;
        color: #484f58;
        font-family: "JetBrains Mono", monospace;
        flex-shrink: 0;
        min-width: 36px;
        text-align: right;
      }

      .section-footer {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 11px;
        border-top: 1px solid #161b22;
      }
      .footer-link {
        font-size: 12px;
        color: #8b949e;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .footer-link:hover {
        color: #58a6ff;
      }

      @media (max-width: 640px) {
        .stat-row {
          grid-template-columns: 1fr 1fr;
        }
        .stat-row .stat-card:last-child {
          grid-column: 1 / -1;
        }
        .main {
          padding: 24px 14px 60px;
        }
        .repo-meta-right {
          display: none;
        }
        .update-repo-stats {
          display: none;
        }
        .blog-repo-right .pub-count,
        .blog-repo-right .draft-count {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a class="nav-logo" href="#">
        <div class="nav-logo-mark">gx</div>
        <span class="nav-logo-text">GitXpert</span>
      </a>
      <div class="nav-right">
        <button class="nav-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          >
            <circle cx="6.5" cy="6.5" r="4.5" />
            <path d="M10.5 10.5L14 14" />
          </svg>
          검색
        </button>
        <div class="nav-avatar">KD</div>
      </div>
    </nav>

    <main class="main">
      <div class="greeting">
        <div class="greeting-sub">금요일, 2026년 4월 17일</div>
        <div class="greeting-title">안녕하세요, <span>kim-dev</span> 님</div>
      </div>

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">연동된 레포지토리</div>
          <div class="stat-value">7</div>
          <div class="stat-sub" style="color: #3fb950">+2 이번 달</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">블로그 연동 레포</div>
          <div class="stat-value">3</div>
          <div class="stat-sub" style="color: #a371f7">md 파일 24개</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">오늘 수정된 파일</div>
          <div class="stat-value">8</div>
          <div class="stat-sub" style="color: #d29922">+243 / −57 lines</div>
        </div>
      </div>

      <!-- SECTION 1: 레포지토리 관리 -->
      <div class="section">
        <div class="section-header" onclick="toggleSection('repo')">
          <div class="section-header-left">
            <div class="section-icon icon-repo">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="#58a6ff">
                <path
                  d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 010-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8z"
                />
              </svg>
            </div>
            <span class="section-title">레포지토리 관리</span>
            <span class="section-count">7</span>
          </div>
          <div class="section-header-right">
            <button class="header-action-btn" onclick="event.stopPropagation()">
              <svg
                width="11"
                height="11"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path d="M8 2v12M2 8h12" />
              </svg>
              레포 추가
            </button>
            <svg
              class="chevron open"
              id="chevron-repo"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M4 6l4 4 4-4" />
            </svg>
          </div>
        </div>
        <div class="section-body" id="body-repo">
          <div id="repo-list"></div>
          <div class="section-footer">
            <a class="footer-link" href="#">
              전체 레포지토리 관리
              <svg
                width="11"
                height="11"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
              >
                <path d="M1 8h14M9 2l6 6-6 6" />
              </svg>
            </a>
          </div>
        </div>
      </div>

      <!-- SECTION 2: 블로그 관리 -->
      <div class="section">
        <div class="section-header" onclick="toggleSection('blog')">
          <div class="section-header-left">
            <div class="section-icon icon-blog">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="#3fb950">
                <path
                  d="M0 1.75A.75.75 0 01.75 1h4.253c1.227 0 2.317.59 3 1.501A3.744 3.744 0 0111.006 1h4.245a.75.75 0 01.75.75v10.5a.75.75 0 01-.75.75h-4.507a2.25 2.25 0 00-1.591.659l-.622.621a.75.75 0 01-1.06 0l-.622-.621A2.25 2.25 0 005.258 13H.75a.75.75 0 01-.75-.75zm7.251 10.324l.004-5.073-.002-2.253A2.25 2.25 0 005.003 2.5H1.5v9h3.757a3.75 3.75 0 012 .756zM8.755 4.75l-.004 7.322a3.752 3.752 0 012-.572H14.5v-9h-3.495a2.25 2.25 0 00-2.25 2.25z"
                />
              </svg>
            </div>
            <span class="section-title">블로그 관리</span>
            <span class="section-count">3개 레포</span>
          </div>
          <div class="section-header-right">
            <button class="header-action-btn" onclick="event.stopPropagation()">
              <svg
                width="11"
                height="11"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path d="M8 2v12M2 8h12" />
              </svg>
              블로그 추가
            </button>
            <svg
              class="chevron open"
              id="chevron-blog"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M4 6l4 4 4-4" />
            </svg>
          </div>
        </div>
        <div class="section-body" id="body-blog">
          <div id="blog-list"></div>
          <div class="section-footer">
            <a class="footer-link" href="#">
              블로그 전체 설정
              <svg
                width="11"
                height="11"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
              >
                <path d="M1 8h14M9 2l6 6-6 6" />
              </svg>
            </a>
          </div>
        </div>
      </div>

      <!-- SECTION 3: 오늘의 업데이트 -->
      <div class="section">
        <div class="section-header" onclick="toggleSection('update')">
          <div class="section-header-left">
            <div class="section-icon icon-update">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="#d29922">
                <path
                  d="M1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0zM8 0a8 8 0 100 16A8 8 0 008 0zm.75 4.75a.75.75 0 00-1.5 0v3.5a.75.75 0 00.22.53l2.25 2.25a.75.75 0 101.06-1.06L8.75 7.94V4.75z"
                />
              </svg>
            </div>
            <span class="section-title">오늘의 업데이트</span>
            <span class="section-count">레포 3 · 파일 8</span>
          </div>
          <div class="section-header-right">
            <span
              style="
                font-size: 11px;
                color: #484f58;
                font-family: &quot;JetBrains Mono&quot;, monospace;
              "
              >Apr 17, 2026</span
            >
            <svg
              class="chevron open"
              id="chevron-update"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M4 6l4 4 4-4" />
            </svg>
          </div>
        </div>
        <div class="section-body" id="body-update">
          <div id="update-list"></div>
          <div class="section-footer">
            <a class="footer-link" href="#">
              전체 커밋 히스토리
              <svg
                width="11"
                height="11"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
              >
                <path d="M1 8h14M9 2l6 6-6 6" />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </main>

    <script>
      const REPOS = [
        {
          name: "design-system",
